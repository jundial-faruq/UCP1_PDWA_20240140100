<!DOCTYPE html>
<html lang="id"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<input Nama="nama" type="text" placeholder="Masukkan nama Anda">
<input Email="email" type="email" placeholder="Masukkan email Anda">
<input Bidang Minat="bidang_minat" type="text" placeholder="Masukkan bidang minat Anda">
<button type="submit">Submit</button>
</head>
<body>
    <h1>Form Pendaftaran</h1>
    <p>Silakan isi form di bawah ini untuk mendaftar ke Tech Community.</p>
    <form action="/submit" method="post">
        <label for="nama">Nama:</label><br>
        <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda"><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Masukkan email Anda"><br><br>
        <label for="bidang_minat">Bidang Minat:</label><br>
        <input type="text" id="bidang_minat" name="bidang_minat" placeholder="Masukkan bidang minat Anda"><br><br>
        <button type="submit">Submit</button>
    </form>
</body>
<link rel="stylesheet" type="text/css" href="styles.css">
</html>
