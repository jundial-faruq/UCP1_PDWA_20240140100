<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Document</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 40px;
            color: #333;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: auto;
        }
        h1 { font-size: 24px; color: #1a73e8; margin-bottom: 10px; }
        label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 5px; }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Agar padding tidak meluap */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #1557b0; }
        #hasilInput {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-left: 5px solid #1a73e8;
            border-radius: 4px;
        }
        .back-link { text-decoration: none; color: #666; font-size: 14px; display: block; text-align: center; margin-top: 20px; }
        .back-link:hover { color: #1a73e8; }
    </style>
</head>
<body>
     <h1>Form Pendaftaran</h1>
    <p>Silakan isi form di bawah ini untuk mendaftar ke Tech Community.</p>
    
    <form id="formPendaftaran">
        <label for="nama">Nama:</label><br>
        <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Masukkan email Anda"><br><br>

        <label for="bidang_minat">Bidang Minat:</label><br>
        <select id="bidang_minat" name="bidang_minat">
            <option value="">-- Pilih Bidang Minat --</option>
            <option value="web">Web Development</option>
            <option value="mobile">Mobile Development</option>
            <option value="ai">Artificial Intelligence</option>
            <option value="cyber">Cyber Security</option>
       </select><br><br>

        <button type="submit">Submit</button>
    </form>

<   <!-- ✅ DITAMBAHKAN: div untuk menampilkan hasil input di bawah form -->
    <div id="hasilInput"></div>

    <br>
    <!-- ✅ DITAMBAHKAN: tombol kembali ke halaman utama -->
    <a href="index.html">← Kembali ke Halaman Utama</a>

    <!-- ✅ DITAMBAHKAN: JavaScript untuk menangkap data, alert, tampil di bawah form, dan simpan ke array -->
    <script>
        const dataMember = [];

        document.getElementById('formPendaftaran').addEventListener('submit', function(e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const bidang = document.getElementById('bidang_minat').value;

            // Simpan ke array
            dataMember.push({ nama, email, bidang });

            // Tampilkan alert
            alert(`Data tersimpan!\nNama: ${nama}\nEmail: ${email}\nBidang Minat: ${bidang}`);

            // Tampilkan di bawah form
            document.getElementById('hasilInput').innerHTML = `
                <h3>Data yang Diinput:</h3>
                <p><strong>Nama:</strong> ${nama}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Bidang Minat:</strong> ${bidang}</p>
            `;

            console.log('Array dataMember:', dataMember);
        });
    </script>
</body>
</html>
